<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Your RecallStack Daily Digest</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f9fafb; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 8px; border: 1px solid #e5e7eb; }
    h2 { color: #1f2937; margin-top: 0; }
    h3 { color: #374151; border-bottom: 1px solid #e5e7eb; padding-bottom: 5px; margin-top: 25px; }
    p { color: #4b5563; font-size: 16px; line-height: 1.5; }
    ul { padding-left: 20px; color: #4b5563; }
    li { margin-bottom: 15px; font-size: 15px; }
    .btn { display: inline-block; background-color: #4f46e5; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 20px; }
    .footer { margin-top: 30px; border-top: 1px solid #e5e7eb; padding-top: 20px; font-size: 12px; color: #9ca3af; text-align: center; }
    .quote { color: #555; font-style: italic; display: block; margin-top: 5px; padding-left: 10px; border-left: 2px solid #e5e7eb; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Your RecallStack Daily Digest</h2>
    <p>Hi {{name}},</p>
    <p>Here is a summary of the activity on your notes over the last 24 hours:</p>
    
    {{digestContent}}
    
    <br/>
    <a href="https://recallstack.vercel.app/dashboard" class="btn" style="color: #ffffff;">Go to Dashboard</a>
    <div class="footer">
      <p>Manage your notification preferences in your Settings.</p>
      <p>RecallStack Notifier &copy; 2026. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
